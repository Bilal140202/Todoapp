name: premium_notes_app
description: A premium notes app with ultra-high quality UI/UX

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  flutter_staggered_grid_view: ^0.7.0
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0
  lottie: ^2.7.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  flutter_quill: ^8.6.0
  intl: ^0.18.1
  uuid: ^4.2.1
  image_picker: ^1.0.4
  share_plus: ^7.2.1
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/icons/
