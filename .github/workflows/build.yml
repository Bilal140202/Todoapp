name: Build Premium Notes APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: "3.24.0"
        channel: "stable"
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Analyze code
      run: flutter analyze
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: premium-notes-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        
    - name: Rename APK
      run: |
        mkdir -p release
        cp build/app/outputs/flutter-apk/app-release.apk release/PremiumNotes-v1.0.0.apk
    
    - name: Upload to Release
      uses: actions/upload-artifact@v4
      with:
        name: premium-notes-release
        path: release/PremiumNotes-v1.0.0.apk
